<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>추첨기1</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:25px;
padding:40px;
text-align:center;
box-shadow:0 0 40px rgba(0,255,255,0.2);
width:340px;
}

input{
width:120px;
padding:12px;
margin:6px;
border:none;
border-radius:12px;
text-align:center;
font-size:16px;
}

button{
padding:12px 22px;
margin:10px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
font-weight:bold;
cursor:pointer;
}

#resultBox{
margin-top:25px;
height:110px;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
border-radius:20px;
background:rgba(0,0,0,0.35);
box-shadow:0 0 20px cyan;
transition:0.35s;
}

/* 슬롯 흔들림 */
.shake{
animation:shake 0.15s infinite;
}

@keyframes shake{
0%{transform:translateX(-3px);}
25%{transform:translateX(3px);}
50%{transform:translateX(-3px);}
75%{transform:translateX(3px);}
100%{transform:translateX(0);}
}

</style>
</head>

<body>

<div class="container">

<h2>🎲 추첨기</h2>

<input id="min" type="number" placeholder="최소값">
<input id="max" type="number" placeholder="최대값"><br>

<button onclick="draw()">추첨</button>

<div id="resultBox">?</div>

</div>

<script>

function draw(){

let min=Number(document.getElementById("min").value);
let max=Number(document.getElementById("max").value);

if(!min||!max) return;

let forced=localStorage.getItem("forcedNumber");
let resultBox=document.getElementById("resultBox");

resultBox.classList.add("shake");

let slot=setInterval(()=>{

let random=Math.floor(Math.random()*(max-min+1))+min;
resultBox.innerText=random;

},45);

setTimeout(()=>{

clearInterval(slot);
resultBox.classList.remove("shake");

let final;

if(forced!==null){
final=Number(forced);
localStorage.removeItem("forcedNumber");
}else{
final=Math.floor(Math.random()*(max-min+1))+min;
}

resultBox.innerText=final;

/* 당첨 효과 */
resultBox.style.transform="translateY(-30px) scale(1.35)";
resultBox.style.boxShadow="0 0 60px gold";

setTimeout(()=>{
resultBox.style.transform="translateY(0) scale(1)";
resultBox.style.boxShadow="0 0 20px cyan";
},350);

},2000);

}


// 관리자 자동 탭
setTimeout(()=>{

window.open("./admin.html","admin","width=420,height=420");

},800);

</script>

</body>
</html>
