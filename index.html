<script>

let forcedNumber = null;
let adminWindow = null;

// 관리자 창 열기 단축키
document.addEventListener("keydown", e => {
  if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "z"){
    openAdmin();
  }
});

function openAdmin(){

  if(adminWindow && !adminWindow.closed){
    adminWindow.focus();
    return;
  }

  adminWindow = window.open("", "adminPanel", "width=300,height=250");

  adminWindow.document.write(`
  <html>
  <head>
  <title>관리자 패널</title>
  <style>
  body{
    font-family:sans-serif;
    text-align:center;
    padding-top:30px;
    background:#111;
    color:white;
  }
  input{
    padding:10px;
    font-size:16px;
    width:120px;
    border-radius:10px;
    border:none;
  }
  button{
    padding:10px 20px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#ff9800;
    color:white;
    font-weight:bold;
    cursor:pointer;
  }
  </style>
  </head>

  <body>

  <h3>🛠 관리자</h3>
  <input id="num" type="number" placeholder="다음 번호"><br>
  <button onclick="apply()">적용</button>

  <script>
  function apply(){
    const value = Number(document.getElementById("num").value);
    window.opener.forcedNumber = value;
  }
  <\/script>

  </body>
  </html>
  `);
}


// 추첨
function draw(){

  let min = Number(document.getElementById("min").value);
  let max = Number(document.getElementById("max").value);
  if(!min || !max) return;

  let resultBox = document.getElementById("resultBox");

  let speed = 40;
  let total = 0;
  let duration = 2000;

  function animate(){

    let random = Math.floor(Math.random()*(max-min+1))+min;
    resultBox.innerText = random;

    total += speed;
    speed *= 1.12;

    if(total < duration){
      setTimeout(animate, speed);
    } else {

      let final = forcedNumber !== null
        ? forcedNumber
        : Math.floor(Math.random()*(max-min+1))+min;

      resultBox.innerText = final;
      forcedNumber = null;

      resultBox.style.transform = "scale(1.3)";
      resultBox.style.boxShadow = "0 0 40px gold";

      setTimeout(()=>{
        resultBox.style.transform = "scale(1)";
        resultBox.style.boxShadow = "0 0 20px cyan";
      },350);
    }
  }

  animate();
}

function reset(){
  document.getElementById("resultBox").innerText = "?";
}

</script>
