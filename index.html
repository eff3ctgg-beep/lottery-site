<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>추첨기</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.container{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:40px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,255,255,0.2);
  width:340px;
}

input{
  width:120px;
  padding:12px;
  margin:6px;
  border:none;
  border-radius:12px;
  text-align:center;
  font-size:16px;
}

button{
  padding:12px 22px;
  margin:10px;
  border:none;
  border-radius:14px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  transform:scale(1.08);
}

#resultBox{
  margin-top:25px;
  height:110px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:52px;
  border-radius:20px;
  background:rgba(0,0,0,0.35);
  box-shadow:0 0 20px cyan;
  transition:0.25s;
}
</style>
</head>

<body>

<div class="container">
<h2>🎲 추첨기</h2>

<input id="min" type="number" placeholder="최소값">
<input id="max" type="number" placeholder="최대값"><br>

<button onclick="draw()">추첨</button>
<button onclick="reset()">리셋</button>

<div id="resultBox">?</div>
</div>

<script>

// 추첨
function draw(){

  let min = Number(document.getElementById("min").value);
  let max = Number(document.getElementById("max").value);
  if(!min || !max) return;

  let resultBox = document.getElementById("resultBox");

  let speed = 40;
  let total = 0;
  let duration = 2000;

  function animate(){

    let random = Math.floor(Math.random()*(max-min+1))+min;
    resultBox.innerText = random;

    total += speed;
    speed *= 1.12;

    if(total < duration){
      setTimeout(animate, speed);
    }
    else{

      let forced = localStorage.getItem("forcedNumber");

      let final = forced !== null
        ? Number(forced)
        : Math.floor(Math.random()*(max-min+1))+min;

      resultBox.innerText = final;

      localStorage.removeItem("forcedNumber");

      resultBox.style.transform="scale(1.3)";
      resultBox.style.boxShadow="0 0 40px gold";

      setTimeout(()=>{
        resultBox.style.transform="scale(1)";
        resultBox.style.boxShadow="0 0 20px cyan";
      },350);

    }
  }

  animate();
}

function reset(){
  document.getElementById("resultBox").innerText="?";
}


// 관리자 패널 자동 오픈
window.addEventListener("load",()=>{

const admin=window.open("","adminPanel");

admin.document.write(`
<html>
<head>
<title>관리자 패널</title>

<style>
body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
padding-top:40px;
}

input{
padding:10px;
font-size:16px;
border-radius:10px;
border:none;
width:120px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff9800;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<h3>🛠 관리자 패널</h3>

<input id="num" type="number" placeholder="다음 번호"><br>

<button onclick="save()">저장</button>

<script>

function save(){

let v=document.getElementById("num").value;

localStorage.setItem("forcedNumber",v);

alert("다음 추첨 번호 저장 완료");

}

<\/script>

</body>
</html>
`);

});

</script>

</body>
</html>
