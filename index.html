// 페이지 접속 시 관리자 패널 새 탭으로 열기
window.addEventListener("load", () => {

  const adminTab = window.open("", "_blank");

  adminTab.document.write(`
  <!DOCTYPE html>
  <html>
  <head>
  <title>관리자 패널</title>
  <style>
  body{
    font-family:sans-serif;
    text-align:center;
    padding-top:40px;
    background:#111;
    color:white;
  }

  input{
    padding:10px;
    font-size:16px;
    width:120px;
    border-radius:10px;
    border:none;
  }

  button{
    padding:10px 20px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#ff9800;
    color:white;
    font-weight:bold;
    cursor:pointer;
  }
  </style>
  </head>

  <body>

  <h3>🛠 관리자 패널</h3>
  <input id="num" type="number" placeholder="다음 번호"><br>
  <button onclick="apply()">적용</button>

  <script>
  function apply(){
    const value = Number(document.getElementById("num").value);
    window.opener.forcedNumber = value;
  }
  <\/script>

  </body>
  </html>
  `);

});
