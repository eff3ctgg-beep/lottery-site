<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>관리자 패널</title>

<style>
body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
padding-top:80px;
}

input{
padding:10px;
font-size:16px;
border-radius:10px;
border:none;
width:160px;
}

button{
margin-top:15px;
padding:10px 25px;
border:none;
border-radius:10px;
background:#ff9800;
color:white;
font-weight:bold;
cursor:pointer;
}

#preview{
margin-top:40px;
font-size:60px;
height:80px;
display:flex;
align-items:center;
justify-content:center;
transition:0.4s;
}

.spin{
animation:spin 0.1s linear infinite;
}

@keyframes spin{
0%{transform:translateY(-10px);}
50%{transform:translateY(10px);}
100%{transform:translateY(-10px);}
}
</style>
</head>

<body>

<h2>🛠 관리자 패널</h2>

<input id="num" type="number" placeholder="당첨 번호"><br>

<button onclick="save()">저장</button>

<div id="preview">?</div>

<script>

function save(){

let v=document.getElementById("num").value;

if(v===""){
alert("숫자를 입력하세요");
return;
}

let preview=document.getElementById("preview");

preview.classList.add("spin");

let count=0;
let speed=80;

function roll(){

preview.innerText=Math.floor(Math.random()*100);

count++;

if(count<25){

speed+=10;
setTimeout(roll,speed);

}else{

preview.classList.remove("spin");

preview.innerText=v;

preview.style.transform="translateY(-25px) scale(1.3)";
preview.style.textShadow="0 0 20px gold";

setTimeout(()=>{
preview.style.transform="translateY(0) scale(1)";
preview.style.textShadow="0 0 10px orange";
},400);

localStorage.setItem("forcedNumber",v);

setTimeout(()=>{
alert("다음 추첨 번호 저장 완료");
},450);

}

}

roll();

}

</script>

</body>
</html>
